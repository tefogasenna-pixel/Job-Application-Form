<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application | Tefo Abigail Gasenna</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --accent-red: #e61e25; --bg-black: #0a0a0a; }
        body { background-color: var(--bg-black); color: white; font-family: 'Montserrat', sans-serif; padding-top: 50px; }
        fieldset { border: 2px solid var(--accent-red); padding: 20px; margin-bottom: 30px; } /* [cite: 151, 152] */
        legend { color: var(--accent-red); font-weight: bold; width: auto; padding: 0 10px; font-family: 'Inter'; } /* [cite: 156, 157, 158] */
        .form-label { font-weight: bold; font-size: 0.9rem; }
        .form-control, .form-select { background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 0; }
        .form-control:focus { background: #222; color: white; border-color: var(--accent-red); box-shadow: none; }
        .btn-submit { background-color: var(--accent-red); color: white; border: none; padding: 10px 25px; font-weight: bold; }
        .btn-reset { background-color: #333; color: white; border: none; padding: 10px 25px; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container my-5">
    <h1 class="text-center mb-5" style="font-family: 'Inter';">JOB <span style="color: var(--accent-red);">APPLICATION</span></h1>

    <form id="jobForm" onsubmit="return validateForm()"> <fieldset>
            <legend>Personal Information</legend>
            <div class="mb-3">                                         
                <label for="fullname" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullname" name="fullname">
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="telephone" class="form-label">Telephone Number</label>
                    <input type="text" class="form-control" id="telephone" name="telephone">
                </div>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Physical Address</label>
                <input type="text" class="form-control" id="address">
            </div>
        </fieldset>

        <fieldset>
            <legend>Job Position</legend>
            <div class="mb-3">
                <label class="form-label">Desired Job Title</label>
                <select class="form-select">
                    <option value="">Select a position...</option>
                    <option>Account Executive</option>
                    <option>Business Development</option>
                    <option>Inside Sales</option>
                    <option>Sales Manager</option>
                    <option>VP Sales</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label d-block">Employment Type</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="empType" id="ptc">
                    <label class="form-check-label" for="ptc">Part-time contract</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="empType" id="ftp">
                    <label class="form-check-label" for="ftp">Full-time permanent</label>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Area(s) of Interest</legend>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-check">
                        <input class="form-check-input interest-check" type="checkbox" value="AE" id="check1">
                        <label class="form-check-label" for="check1">Account Executive</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input interest-check" type="checkbox" value="BD" id="check2">
                        <label class="form-check-label" for="check2">Business Development</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-check">
                        <input class="form-check-input interest-check" type="checkbox" value="SM" id="check3">
                        <label class="form-check-label" for="check3">Sales Manager</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input interest-check" type="checkbox" value="VPS" id="check4">
                        <label class="form-check-label" for="check4">VP Sales</label>
                    </div>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Additional Information</legend>
            <div class="mb-3">
                <label class="form-label d-block">Willing to Relocate?</label>
                <input type="radio" name="relocate" value="yes"> Yes
                <input type="radio" name="relocate" value="no" class="ms-3"> No
            </div>
            <div class="mb-3">
                <label class="form-label">Why are you suitable for this role?</label>
                <textarea class="form-control" rows="4"></textarea>
            </div>
        </fieldset>

        <div class="text-center">
            <button type="submit" class="btn-submit">Submit Application</button>
            <button type="reset" class="btn-reset">Reset Form</button>
        </div>
    </form>
</div>

<script>
function validateForm() {
    let name = document.getElementById("fullname").value;
    let email = document.getElementById("email").value;
    let telephone = document.getElementById("telephone").value;
    
    // Checkboxes validation [cite: 255]
    let checkboxes = document.querySelectorAll('.interest-check:checked');

    if (name === "" || email === "" || telephone === "") {
        alert("Please complete all required fields (Name, Email, Telephone)."); // [cite: 259]
        return false;
    }

    if (checkboxes.length === 0) {
        alert("Please select at least one area of interest."); // [cite: 255]
        return false;
    }

    alert("Application submitted successfully!");
    return true; // [cite: 260]
}
</script>

</body>

</html>
